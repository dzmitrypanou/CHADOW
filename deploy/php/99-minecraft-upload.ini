; Minecraft client pack uploads (admin ZIP up to 2 GiB).
; Install on the server:
;   sudo cp deploy/php/99-minecraft-upload.ini /etc/php/8.3/fpm/conf.d/
;   sudo systemctl reload php8.3-fpm
;
; Adjust PHP version path if needed (php -v).

upload_max_filesize = 2048M
post_max_size = 2048M
max_execution_time = 3600
max_input_time = 3600

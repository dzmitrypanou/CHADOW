# Редирект abs.chadow.ru → https://chadow.ru/
# Установка (PuTTY):
#   cp /var/www/chadow.ru/deploy/apache/abs-chadow-redirect.conf /etc/apache2/sites-available/
#   a2ensite abs-chadow-redirect.conf
#   certbot --apache -d chadow.ru -d www.chadow.ru -d abs.chadow.ru --expand
#   apache2ctl configtest && systemctl reload apache2

<VirtualHost *:80>
    ServerName abs.chadow.ru
    Redirect permanent / https://chadow.ru/
</VirtualHost>

<VirtualHost *:443>
    ServerName abs.chadow.ru

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/chadow.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/chadow.ru/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Redirect permanent / https://chadow.ru/
</VirtualHost>

# Apache: pretty URL for Minecraft launcher API
# Include from vhost or copy into existing config.

<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteRule ^api/minecraft/bootstrap/?$ /api/minecraft/bootstrap.php [L]
    RewriteRule ^api/minecraft/oauth/(start|callback|poll|go)/?$ /api/minecraft/oauth/$1.php [L]
</IfModule>

# WebSocket reverse proxy for tactical board (Apache 2.4 + mod_proxy_wstunnel)
# Enable once: a2enmod proxy proxy_http proxy_wstunnel
# Include inside the SSL VirtualHost for chadow.ru (inside <VirtualHost *:443>).

ProxyPreserveHost On
ProxyPass /tactics-ws ws://127.0.0.1:8791/
ProxyPassReverse /tactics-ws ws://127.0.0.1:8791/

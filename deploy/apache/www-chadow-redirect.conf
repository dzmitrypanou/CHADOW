# Редирект www.chadow.ru → https://chadow.ru/ (с сохранением пути и query)
# Установка (PuTTY):
#   bash /var/www/chadow.ru/deploy/apache/install-www-redirect.sh
#
# Важно: www не должен быть в ServerAlias основного SSL-vhost — иначе Apache
# отдаёт сайт на www вместо редиректа (install-www-redirect.sh убирает это).

<VirtualHost *:80>
    ServerName www.chadow.ru
    Redirect permanent / https://chadow.ru/
</VirtualHost>

<VirtualHost *:443>
    ServerName www.chadow.ru

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/chadow.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/chadow.ru/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Redirect permanent / https://chadow.ru/
</VirtualHost>



<VirtualHost *:80>
    ServerName www.chadow.ru
    Redirect permanent / https:
</VirtualHost>

<VirtualHost *:443>
    ServerName www.chadow.ru

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/chadow.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/chadow.ru/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Redirect permanent / https:
</VirtualHost>

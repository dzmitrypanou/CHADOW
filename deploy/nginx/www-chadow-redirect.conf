

server {
    listen 80;
    listen [::]:80;
    server_name www.chadow.ru;
    return 301 https:
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.chadow.ru;

    ssl_certificate /etc/letsencrypt/live/chadow.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chadow.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https:
}

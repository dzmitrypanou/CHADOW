# Редирект www.chadow.ru → https://chadow.ru/
# Установка (PuTTY):
#   cp /var/www/chadow.ru/deploy/nginx/www-chadow-redirect.conf /etc/nginx/sites-available/
#   ln -sf /etc/nginx/sites-available/www-chadow-redirect.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Если certbot уже выпускал сертификат для www, пути к pem-файлам совпадают с chadow.ru.

server {
    listen 80;
    listen [::]:80;
    server_name www.chadow.ru;
    return 301 https://chadow.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.chadow.ru;

    ssl_certificate /etc/letsencrypt/live/chadow.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chadow.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://chadow.ru$request_uri;
}
